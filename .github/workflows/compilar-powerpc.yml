name: Compilar para PowerPC

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ppc:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do seu repositório para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Instala o compilador cruzado G++ para PowerPC
    - name: Instalar compilador PowerPC
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-powerpc64-linux-gnu

    # 3. Compila o seu arquivo C++ (substitua 'main.cpp' pelo seu arquivo)
    - name: Compilar Código C++
      run: |
        powerpc64-linux-gnu-g++ -static main.cpp -o meu_programa_ppc

    # 4. Salva o binário gerado para você fazer o download no GitHub
    - name: Salvar Binário
      uses: actions/artifacts@v4
      with:
        name: programa-powerpc
        path: meu_programa_ppc

