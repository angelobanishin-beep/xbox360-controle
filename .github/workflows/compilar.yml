name: Compilar para Xbox 360

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Alterado para a imagem oficial mantida pelo projeto do LibXenon
      image: free60/libxenon:latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Compilar o arquivo C++
      run: |
        # Cria o arquivo ELF usando o compilador oficial da ferramenta
        xenon-g++ main.cpp -o controle.elf -lxenon -lm
        # Converte para o formato executavel do Xbox 360 (.xex)
        xenon-elf-objcopy -O binary controle.elf controle.xex

    - name: Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: Executavel-Xbox360
        path: controle.xex
