name: Compilar para Xbox 360

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Instalar Ferramentas de Compilacao
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc-powerpc-linux-gnu g++-powerpc-linux-gnu

    - name: Compilar o arquivo C++
      run: |
        # Usa o compilador cross-compile oficial de Linux para arquitetura PowerPC (Xbox 360)
        powerpc-linux-gnu-g++ main.cpp -o controle.elf -static
